<!DOCTYPE html>
<html>
<head>
<title>Text Summarizer</title>
<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}
  
.container{
background:white;
padding:30px;
border-radius:10px;
width:60%;
margin:auto;
box-shadow:0 0 10px gray;
}

textarea{
width:100%;
height:150px;
margin-top:10px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>
<body>
<div class="container">
<h2>Extractive Text Summarizer</h2>
<form method="POST" enctype="multipart/form-data">
<input type="file" name="file" accept=".txt,.pdf,.docx" required>
</br>
</br>
<button type="submit">Summarize</button>
</form>
<h3>Summary</h3>
<textarea readonly>{{summary}}</textarea>

</div>

</body>
</html>
